<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draco Prueba | Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (Se ocultará en móvil con CSS) -->
        <aside class="sidebar" id="sidebar">
            <button class="icon-btn" id="menu-btn"><i class="ph ph-list"></i></button>
            <div class="new-chat">+ Nuevo Chat</div>
        </aside>

        <main class="chat-section">
            <header class="header">
                <div class="logo">Draco 2.9 <span>Ultra</span></div>
            </header>

            <div id="chat-flow" class="chat-flow">
                <div class="welcome" id="welcome">
                    <h1>Hola de nuevo</h1>
                    <p>Esta es la prueba de conexión. Escribe algo abajo.</p>
                </div>
            </div>

            <footer class="input-area">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Mensaje de prueba..." rows="1"></textarea>
                    <button id="send-btn" disabled><i class="ph ph-paper-plane-right"></i></button>
                </div>
            </footer>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
